<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบเฝ้าระวังผู้ป่วย Zero-Touch AI</title>
    <style>
        body {
            font-family: 'Kanit', Tahoma, sans-serif;
            background-color: #f0f8ff;
            text-align: center;
            margin: 0;
            padding: 20px;
        }
        h1 { color: #333; font-size: 2.5em; margin-bottom: 10px; }
        .container {
            max-width: 800px;
            margin: auto;
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        #webcam-container {
            margin: 20px auto;
            border: 5px solid #ddd;
            border-radius: 15px;
            overflow: hidden;
            display: inline-block;
        }
        .status-box {
            font-size: 2em;
            font-weight: bold;
            padding: 20px;
            border-radius: 15px;
            margin: 20px 0;
            background-color: #e0e0e0;
            color: #555;
        }
        .btn-start {
            background-color: #4CAF50;
            color: white;
            padding: 15px 40px;
            font-size: 1.5em;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .btn-start:hover { background-color: #45a049; }

        .top-navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: #2c3e50;
            padding: 15px 30px;
            color: white;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            margin: -20px -20px 30px -20px;
        }

        .nav-logo {
            font-size: 1.4em;
            font-weight: bold;
        }

        .nav-links {
            display: flex;
            gap: 15px;
        }

        .nav-btn {
            background: transparent;
            border: none;
            color: #bdc3c7;
            padding: 10px 15px;
            font-size: 1em;
            font-family: 'Kanit', sans-serif;
            cursor: pointer;
            border-radius: 8px;
            transition: all 0.2s;
        }

        .nav-btn:hover, .nav-btn.active {
            color: white;
            background-color: #34495e;
        }

        .nav-btn.emergency {
            background-color: #e74c3c;
            color: white;
        }
        .nav-btn.emergency:hover {
            background-color: #c0392b;
        }
    </style>
</head>
<body>

<nav class="top-navbar">
    <div class="nav-logo">
        <span>🤖</span> Zero-Touch AI Monitor
    </div>
    <div class="nav-links">
        <button class="nav-btn active" onclick="showPage('live')">📺 หน้าจอสด (Live)</button>
        <button class="nav-btn" onclick="showPage('history')">📜 ประวัติแจ้งเตือน</button>
        <button class="nav-btn" onclick="showPage('settings')">⚙️ ตั้งค่าระบบ</button>
        <button class="nav-btn emergency" onclick="triggerManualPanic()">🚨 ฉุกเฉิน (Panic)</button>
    </div>
</nav>

<div class="container">
    <h1>💙 ระบบผู้ช่วยความจำอัจฉริยะ</h1>
    
    <button type="button" class="btn-start" id="startBtn" onclick="init()">เริ่มเปิดระบบกล้อง AI</button>
    
    <div id="webcam-container"></div>
    
    <div id="status" class="status-box">กำลังรอสแกนใบหน้า...</div>
    
    <p>ระบบจะตรวจเช็กทุกๆ 15 นาที หากไม่พบผู้ป่วยจะแจ้งเตือนผ่าน LINE</p>
</div>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>

<script src="app.js"></script>

</body>
</html>
