<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบเฝ้าระวังผู้ป่วย Zero-Touch AI</title>
    <style>
        body {
            font-family: 'Kanit', Tahoma, sans-serif;
            background-color: #f0f8ff;
            text-align: center;
            margin: 0;
            padding: 20px;
        }
        h1 { color: #333; font-size: 2.5em; margin-bottom: 10px; }
        .container {
            max-width: 800px;
            margin: auto;
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        #webcam-container {
            margin: 20px auto;
            border: 5px solid #ddd;
            border-radius: 15px;
            overflow: hidden;
            display: inline-block;
        }
        .status-box {
            font-size: 2em;
            font-weight: bold;
            padding: 20px;
            border-radius: 15px;
            margin: 20px 0;
            background-color: #e0e0e0;
            color: #555;
        }
        .btn-start {
            background-color: #4CAF50;
            color: white;
            padding: 15px 40px;
            font-size: 1.5em;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .btn-start:hover { background-color: #45a049; }

            .top-navbar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        background-color: #2c3e50;
        padding: 15px 30px;
        color: white;
        box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        margin: -20px -20px 30px -20px; /* Counteracts body padding to stretch full-width */
    }

        .nav-logo {
            font-size: 1.4em;
            font-weight: bold;
        }

        .nav-links {
            display: flex;
            gap: 15px;
        }

        .nav-btn {
            background: transparent;
            border: none;
            color: #bdc3c7;
            padding: 10px 15px;
            font-size: 1em;
            font-family: 'Kanit', sans-serif;
            cursor: pointer;
            border-radius: 8px;
            transition: all 0.2s;
        }

        .nav-btn:hover, .nav-btn.active {
            color: white;
            background-color: #34495e;
        }

        /* Make the Emergency button pop out */
        .nav-btn.emergency {
            background-color: #e74c3c;
            color: white;
        }
        .nav-btn.emergency:hover {
            background-color: #c0392b;
        }
    </style>

    
</head>
<body>

<nav class="top-navbar">
<div class="nav-logo">
    <span>🤖</span> Zero-Touch AI Monitor
</div>
<div class="nav-links">
    <button class="nav-btn active" onclick="showPage('live')">📺 หน้าจอสด (Live)</button>
    <button class="nav-btn" onclick="showPage('history')">📜 ประวัติแจ้งเตือน</button>
    <button class="nav-btn" onclick="showPage('settings')">⚙️ ตั้งค่าระบบ</button>
    <button class="nav-btn emergency" onclick="triggerManualPanic()">🚨 ฉุกเฉิน (Panic)</button>
</div>
</nav>

<div class="container">
    <h1>💙 ระบบผู้ช่วยความจำอัจฉริยะ</h1>
    
    <!-- ปุ่มกดเริ่มระบบเพื่อให้กล้องและเสียงทำงาน -->
    <button type="button" class="btn-start" id="startBtn" onclick="init()">เริ่มเปิดระบบกล้อง AI</button>
    
    <div id="webcam-container"></div>
    
    <!-- กล่องแสดงสถานะ -->
    <div id="status" class="status-box">กำลังรอสแกนใบหน้า...</div>
    
    <p>ระบบจะตรวจเช็กทุกๆ 15 นาที หากไม่พบผู้ป่วยจะแจ้งเตือนผ่าน LINE</p>
</div>



<!-- โหลดไลบรารี AI ของ Google -->
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>

<script type="text/javascript">
    // ==========================================
    // 1. จุดที่ต้องแก้ไขข้อมูลส่วนตัว (ตั้งค่าตรงนี้)
    // ==========================================
    // ใส่ลิงก์ Model ที่ได้จากเว็บ Teachable Machine (อย่าลืมใส่ / ท้ายสุด)
    const URL = "https://teachablemachine.withgoogle.com/models/YOUR_MODEL_LINK_HERE/"; 
    
    // ใส่ชื่อ Class ที่เราตั้งไว้ว่าเป็นหน้าผู้ป่วย (เช่น "Patient", "Grandma") ให้ตรงกันเป๊ะๆ
    const targetClassName = "Patient"; 

    // ลิงก์ Webhook จากเว็บ Make.com สำหรับส่งเข้า LINE (แก้ปัญหาเรื่อง Browser บล็อกการส่งไลน์โดยตรง)
    const webhookURL = "https://hook.us1.make.com/YOUR_WEBHOOK_LINK_HERE";

    // ==========================================
    // ตัวแปรระบบเบื้องหลัง
    let model, webcam, maxPredictions;
    let isPatientFound = false; 
    let hasAlerted = false; // ป้องกันการเตือนซ้ำรัวๆ

    async function init() {
        // เปลี่ยนหน้าตาปุ่มและสถานะเมื่อกดเริ่ม
        document.getElementById("startBtn").style.display = "none";
        document.getElementById("status").innerText = "กำลังเปิดกล้องและโหลดสมองกล AI...";

        const modelURL = URL + "model.json";
        const metadataURL = URL + "metadata.json";

        // โหลดโมเดล AI
        model = await tmImage.load(modelURL, metadataURL);
        maxPredictions = model.getTotalClasses();

        // ตั้งค่ากล้อง (กว้าง 400x400)
        const flip = true; 
        webcam = new tmImage.Webcam(400, 400, flip); 
        await webcam.setup(); // ขอสิทธิ์เปิดกล้อง
        await webcam.play();
        
        window.requestAnimationFrame(loop);

        // นำภาพกล้องมาแสดงบนหน้าเว็บ
        document.getElementById("webcam-container").appendChild(webcam.canvas);
        document.getElementById("status").innerText = "สแกนใบหน้าพร้อมทำงาน 🟢";

        // เริ่มจับเวลาเช็กคนหาย (เช่น เช็กทุก 15 นาที -> 15 * 60 * 1000 มิลลิวินาที)
        // เพื่อการทดสอบ ให้เปลี่ยนเป็น 10000 (10 วินาที) ก่อน จะได้เห็นผลไวๆ
        setInterval(checkPatientStatus, 15 * 60 * 1000); 
    }

    async function loop() {
        webcam.update(); 
        await predict();
        window.requestAnimationFrame(loop);
    }

    async function predict() {
        const prediction = await model.predictTopK(webcam.canvas, 1);
        const topResult = prediction[0];

        // ถ้า AI มั่นใจเกิน 85% ว่าเป็นหน้าผู้ป่วย (0.85)
        if (topResult.className === targetClassName && topResult.probability > 0.85) {
            if (!isPatientFound) {
                // บันทึกว่าเจอตัวแล้ว
                isPatientFound = true;
                
                // เปลี่ยนสีกล่องข้อความเป็นสีเขียว
                const statusBox = document.getElementById("status");
                statusBox.innerText = "✅ ยืนยันตัวตนสำเร็จ: ได้เวลาทานยาแล้วค่ะ";
                statusBox.style.backgroundColor = "#d4edda";
                statusBox.style.color = "#155724";

                // (ใส่โค้ดให้เล่นเสียงเตือนตรงนี้ได้)
            }
        }
    }

    // ฟังก์ชันตรวจสอบว่าในเวลาที่กำหนด เจอผู้ป่วยไหม
    function checkPatientStatus() {
        if (isPatientFound) {
            // ถ้าเจอตัวแล้ว ให้รีเซ็ตค่ากลับเป็นค่าเริ่มต้น เพื่อรอเช็กรอบถัดไป
            isPatientFound = false;
            document.getElementById("status").innerText = "สแกนใบหน้าพร้อมทำงาน 🟢";
            document.getElementById("status").style.backgroundColor = "#e0e0e0";
            document.getElementById("status").style.color = "#555";
        } else {
            // ถ้าไม่เจอตัวเลยตลอด 15 นาที ให้ส่งแจ้งเตือน!
            sendLineAlert();
        }
    }

    // ฟังก์ชันยิงข้อความแจ้งเตือน (ส่งผ่าน Webhook ไปหา LINE)
    function sendLineAlert() {
        const statusBox = document.getElementById("status");
        statusBox.innerText = "🚨 ตรวจพบความผิดปกติ: ไม่พบผู้ป่วย!";
        statusBox.style.backgroundColor = "#f8d7da";
        statusBox.style.color = "#721c24";

        fetch(webhookURL, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
                message: "ด่วน! ไม่พบผู้ป่วยในพื้นที่ในช่วงเวลารับยา กรุณากดลิงก์นี้เพื่อดูวิดีโอสด: [ใส่ลิงก์กล้องที่นี่]"
            })
        }).then(response => {
            console.log("ส่งแจ้งเตือนสำเร็จ!");
        }).catch(error => {
            console.error("ส่งแจ้งเตือนไม่สำเร็จ:", error);
        });
    }
</script>

</body>
</html>
